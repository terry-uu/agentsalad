<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<title>Agent Salad</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--s1:#f5f8f5;--s2:#eaf0ea;--s3:#dbe4db;--border:#c8d5c8;
  --t1:#1a2e1a;--t2:#546e54;--t3:#8a9d8a;
  --green:#43A047;--green-s:rgba(67,160,71,.08);
  --red:#E53935;--red-s:rgba(229,57,53,.08);
  --blue:#1E88E5;--blue-s:rgba(30,136,229,.08);
  --r:12px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --shadow:0 1px 3px rgba(26,46,26,.06),0 1px 2px rgba(26,46,26,.04);
  --shadow-md:0 4px 12px rgba(26,46,26,.08);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;user-select:none;-webkit-user-select:none;-webkit-app-region:drag}

.container{display:flex;flex-direction:column;align-items:center;gap:24px;max-width:420px;text-align:center;-webkit-app-region:no-drag}

.logo{font-size:64px;line-height:1;margin-bottom:8px}
.title{font-size:1.6rem;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.subtitle{font-size:.88rem;color:var(--t3);line-height:1.5;margin-top:4px}

.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:600;transition:all .3s ease}
.status-badge .dot{width:8px;height:8px;border-radius:50%;transition:background .3s}
.status-badge.stopped{background:var(--s1);color:var(--t3);border:1px solid var(--border)}
.status-badge.stopped .dot{background:var(--t3)}
.status-badge.checking{background:var(--blue-s);color:var(--blue);border:1px solid var(--blue)}
.status-badge.checking .dot{background:var(--blue);animation:pulse 1s infinite}
.status-badge.installing{background:var(--blue-s);color:var(--blue);border:1px solid var(--blue)}
.status-badge.installing .dot{background:var(--blue);animation:pulse 1s infinite}
.status-badge.starting{background:var(--s1);color:var(--t2);border:1px solid var(--border)}
.status-badge.starting .dot{background:var(--t2);animation:pulse 1s infinite}
.status-badge.running{background:var(--green-s);color:var(--green);border:1px solid var(--green)}
.status-badge.running .dot{background:var(--green)}
.status-badge.error{background:var(--red-s);color:var(--red);border:1px solid var(--red)}
.status-badge.error .dot{background:var(--red)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 32px;border-radius:var(--r);border:none;font-size:.92rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;min-width:160px}
.btn:active{transform:scale(.97)}
.btn-start{background:var(--green);color:#fff;box-shadow:var(--shadow)}
.btn-start:hover{background:#388E3C;box-shadow:var(--shadow-md)}
.btn-stop{background:var(--red);color:#fff;box-shadow:var(--shadow)}
.btn-stop:hover{background:#C62828;box-shadow:var(--shadow-md)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-sm{font-size:.8rem;padding:8px 20px;min-width:auto;opacity:.7}

.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.spinner.blue{border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}

.progress-bar{width:200px;height:4px;background:var(--s2);border-radius:2px;overflow:hidden;margin:4px auto}
.progress-bar .fill{height:100%;background:var(--blue);border-radius:2px;animation:progress-indeterminate 1.5s ease-in-out infinite}
@keyframes progress-indeterminate{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

.log-area{width:100%;max-width:560px;margin-top:8px}
.log-toggle{background:none;border:none;color:var(--t3);font-size:.75rem;cursor:pointer;font-family:var(--font);padding:4px 8px;border-radius:6px;transition:.12s}
.log-toggle:hover{color:var(--t2);background:var(--s1)}
.log-box{max-height:180px;overflow-y:auto;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:6px;text-align:left;font-family:var(--mono);font-size:.7rem;line-height:1.6;color:var(--t2);display:none;word-break:break-all}
.log-box.visible{display:block}
.log-box .log-err{color:var(--red)}

.error-msg{font-size:.82rem;color:var(--red);background:var(--red-s);padding:10px 16px;border-radius:8px;border:1px solid rgba(229,57,53,.2);max-width:400px;line-height:1.5}

[data-view]{display:none}
[data-view].active{display:flex;flex-direction:column;align-items:center;gap:16px}
</style>
</head>
<body>

<div class="container">
  <div class="logo">🥗</div>
  <div class="title">Agent Salad</div>

  <!-- Stopped -->
  <div data-view="stopped" class="active">
    <div class="subtitle">서버가 꺼져 있습니다.</div>
    <div class="status-badge stopped"><span class="dot"></span>Stopped</div>
    <button class="btn btn-start" id="btn-start">Start Server</button>
  </div>

  <!-- Checking Node.js -->
  <div data-view="checking">
    <div class="subtitle">환경을 확인하는 중...</div>
    <div class="status-badge checking"><span class="dot"></span>Checking</div>
    <div class="spinner blue"></div>
  </div>

  <!-- Installing dependencies -->
  <div data-view="installing">
    <div class="subtitle">의존성을 설치하는 중입니다...<br><small style="color:var(--t3)">첫 실행 시에만 소요됩니다.</small></div>
    <div class="status-badge installing"><span class="dot"></span>Installing</div>
    <div class="progress-bar"><div class="fill"></div></div>
    <button class="btn btn-stop btn-sm" id="btn-stop-installing">Cancel</button>
  </div>

  <!-- Starting server -->
  <div data-view="starting">
    <div class="subtitle">서버를 시작하는 중...</div>
    <div class="status-badge starting"><span class="dot"></span>Starting</div>
    <div class="spinner"></div>
    <button class="btn btn-stop btn-sm" id="btn-stop-starting">Cancel</button>
  </div>

  <!-- Error -->
  <div data-view="error">
    <div class="status-badge error"><span class="dot"></span>Error</div>
    <div class="error-msg" id="error-msg">서버 시작에 실패했습니다.</div>
    <button class="btn btn-start" id="btn-retry">Retry</button>
  </div>

  <!-- Log Area -->
  <div class="log-area">
    <button class="log-toggle" id="log-toggle">▸ Server Logs</button>
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<script>
(function() {
  const api = window.electronAPI;
  if (!api) return;

  const views = document.querySelectorAll('[data-view]');
  const logBox = document.getElementById('log-box');
  const logToggle = document.getElementById('log-toggle');
  let logVisible = false;

  function showView(name) {
    views.forEach(v => v.classList.toggle('active', v.dataset.view === name));
    if (name === 'installing' && !logVisible) {
      logVisible = true;
      logBox?.classList.add('visible');
      if (logToggle) logToggle.textContent = '▾ Server Logs';
    }
  }

  function appendLog(line) {
    if (!logBox) return;
    const div = document.createElement('div');
    if (line.includes('[stderr]') || line.toLowerCase().includes('error')) {
      div.className = 'log-err';
    }
    div.textContent = line;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
    if (logBox.children.length > 300) logBox.removeChild(logBox.firstChild);
  }

  logToggle?.addEventListener('click', () => {
    logVisible = !logVisible;
    logBox?.classList.toggle('visible', logVisible);
    logToggle.textContent = logVisible ? '▾ Server Logs' : '▸ Server Logs';
  });

  document.getElementById('btn-start')?.addEventListener('click', () => api.startServer());
  document.getElementById('btn-retry')?.addEventListener('click', () => api.startServer());
  document.getElementById('btn-stop-starting')?.addEventListener('click', () => api.stopServer());
  document.getElementById('btn-stop-installing')?.addEventListener('click', () => api.stopServer());

  api.onStatusChanged((status) => {
    if (status === 'running') return;
    showView(status);
  });

  api.onLog((line) => appendLog(line));

  api.getStatus().then((status) => {
    showView(status === 'running' ? 'stopped' : status);
  });

  api.getLogs().then((logs) => {
    if (logs && logs.length) logs.forEach(l => appendLog(l));
  });
})();
</script>
</body>
</html>
